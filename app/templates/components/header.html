<header class="site-header">

    <div class="container header-inner">

        <a href="/" class="logo" aria-label="Converigo home">
            <img src="/static/images/converigo-logo.png" alt="Converigo logo">
            <span>Converigo</span>
        </a>

        <input type="checkbox" id="navToggle" class="nav-toggle" hidden>
        <label for="navToggle" class="nav-toggle-button" aria-label="{{ request.state.t('nav.toggle_menu', 'Toggle navigation') }}">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <nav class="main-nav" role="navigation" aria-label="Primary navigation">
            <a href="/tools">
                {{ request.state.t('nav.tools', 'Tools') }}
            </a>

            <a href="https://ko-fi.com/converigo" target="_blank" rel="noopener" class="nav-support-link">
                {{ request.state.t('nav.support', 'Support') }}
            </a>

            <a href="/pricing" class="nav-hidden">
                {{ request.state.t('nav.pricing', 'Pricing') }}
            </a>

            <a href="/api" class="nav-hidden">
                {{ request.state.t('nav.api', 'API') }}
            </a>
        </nav>

        <div class="header-right">
            <div class="language-switcher">
                <span class="language-icon" aria-hidden="true">🌐</span>
                <label for="languageSelect" class="sr-only">{{ request.state.t('language.selector_label', 'Language') }}</label>
                <select id="languageSelect" onchange="handleLanguageChange(event)">
                    {% for locale_code in request.state.supported_locales %}
                        <option value="{{ locale_code }}" {% if request.state.locale.lang_code == locale_code %}selected{% endif %}>
                            {{ request.state.t('language.' ~ locale_code, locale_code.upper()) }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="header-actions">
                <button class="btn btn-secondary button-hidden">
                    {{ t('header.sign_in', 'Sign In') }}
                </button>

                <button class="btn btn-primary">
                    {{ t('header.get_started', 'Get Started') }}
                </button>
            </div>
        </div>
    </div>

</header>
