<section class="popular-tools">

    <div class="container">

        <div class="section-header">

            <h2>
                Popular Converters
            </h2>

            <p>
                The most frequently used tools on Converigo.
            </p>

        </div>

        <div class="tools-grid">

            {% for converter in popular_converters %}

            <a
                href="/tools/{{ converter.slug }}"
                class="tool-card">

                <strong>
                    {{ converter.source | upper }}
                </strong>

                <span>
                    →
                </span>

                <strong>
                    {{ converter.target | upper }}
                </strong>

            </a>

            {% endfor %}

        </div>

    </div>

</section>
