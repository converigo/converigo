<div class="upload-wrapper" id="upload">

    <div class="container">

        <div class="upload-card">

            <div class="upload-icon">
                ☁
            </div>

            <h2>
                Drag &amp; Drop your file
            </h2>

            <p>
                or choose a file from your computer
            </p>

            <button
                id="chooseFile"
                class="btn btn-primary">

                Choose File

            </button>

            <input
                id="fileInput"
                type="file"
                hidden>

            <div class="selected-file">

                <strong id="fileName">

                    No file selected

                </strong>

                <div id="fileSize"></div>

            </div>

            <h3 class="mt-4">
                Convert To
            </h3>

            <!--
                Dynamic Plugin UI

                Format button akan dibuat otomatis
                oleh converter.js berdasarkan:

                GET /api/plugins?source=<extension>

                Jangan menambahkan button manual lagi.
            -->

            <div
                id="formatContainer"
                class="supported-formats">

            </div>

            <button
                id="convertBtn"
                class="btn btn-success"
                hidden>

                Convert

            </button>

            <p
                id="convertMessage"
                class="muted">

            </p>

            <a
                id="downloadBtn"
                class="btn btn-primary"
                hidden
                download>

                Download

            </a>

            <div class="progress">

                <div class="progress-bar"></div>

            </div>

        </div>

    </div>

</div>
