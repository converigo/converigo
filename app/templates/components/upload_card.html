<section class="upload-section" id="upload">

    <div class="container">

        <div class="upload-card">

            <div class="upload-icon">
                ☁
            </div>

            <h2>
                Drag & Drop your file
            </h2>

            <p>
                or choose a file from your computer
            </p>

            <button
                id="chooseFile"
                class="btn btn-primary">

                Choose File

            </button>

            <input
                id="fileInput"
                type="file"
                hidden>

            <div class="selected-file">

                <strong id="fileName">

                    No file selected

                </strong>

                <div id="fileSize"></div>

            </div>

            <div class="supported-formats">

                <span>MP4</span>
                <span>MP3</span>
                <span>PDF</span>
                <span>PNG</span>
                <span>JPG</span>
                <span>WEBP</span>

            </div>

            <button
                id="convertBtn"
                class="btn btn-success"
                hidden>

                Convert

            </button>

            <p
                id="convertMessage"
                class="muted">

            </p>

            <a
                id="downloadBtn"
                class="btn btn-primary"
                hidden
                download>

                Download

            </a>

            <div class="progress">

                <div class="progress-bar"></div>

            </div>

        </div>

    </div>

</section>
