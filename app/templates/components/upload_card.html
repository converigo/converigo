<section class="upload-section">

    <div class="container">

        <div class="upload-card">

            <div class="upload-icon">
                ☁
            </div>

            <h2>
                Drag & Drop your file
            </h2>

            <p>
                or choose a file from your computer
            </p>

            <button
                id="chooseFile"
                class="btn btn-primary">

                Choose File

            </button>

            <input
                id="fileInput"
                type="file"
                hidden>

            <div
                id="selectedFile"
                class="selected-file">

                No file selected

            </div>

            <div class="supported-formats">

                Supports

                <span>MP4</span>

                <span>MP3</span>

                <span>PDF</span>

                <span>PNG</span>

                <span>JPG</span>

                <span>WEBP</span>

            </div>

            <button
                id="convertButton"
                class="btn btn-success"
                hidden>

                Convert

            </button>

        </div>

    </div>

</section>
